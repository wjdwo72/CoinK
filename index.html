<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코인 실시간 매매 신호</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root{
  --bg:#0b0e17;--card:#111827;--card2:#1a2235;--border:#1f2d45;
  --text:#e2e8f0;--muted:#64748b;
  --green:#22c55e;--red:#ef4444;--yellow:#eab308;
  --cyan:#06b6d4;--blue:#3b82f6;--orange:#f97316;--purple:#a855f7;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;font-size:13px;min-height:100vh;}

/* ── 헤더 ── */
header{background:linear-gradient(90deg,#0f172a,#111827);border-bottom:1px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  position:sticky;top:0;z-index:200;}
header h1{font-size:15px;font-weight:700;color:var(--cyan);white-space:nowrap;}
.hr{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
#clock{color:var(--muted);font-size:11px;font-family:monospace;}
#krwRate{font-size:11px;color:var(--yellow);font-family:monospace;}
#status{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;}
.st-scan{background:#1e3a5f;color:var(--cyan);}
.st-ok{background:#14532d;color:var(--green);}
.st-err{background:#450a0a;color:var(--red);}
select,button{background:var(--card2);border:1px solid var(--border);
  color:var(--text);border-radius:6px;padding:4px 9px;font-size:12px;cursor:pointer;}
button:hover{border-color:var(--cyan);}
#scanBtn{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600;padding:5px 14px;}
#scanBtn:disabled{opacity:.5;cursor:not-allowed;}
#settingBtn{background:var(--card2);font-size:14px;padding:4px 10px;}

/* ── 설정 패널 ── */
#settingPanel{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:#000a;z-index:500;align-items:center;justify-content:center;
}
#settingPanel.open{display:flex;}
.sp-box{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:24px;width:min(480px,95vw);display:flex;flex-direction:column;gap:14px;}
.sp-box h2{font-size:15px;font-weight:700;color:var(--cyan);}
.sp-row{display:flex;flex-direction:column;gap:4px;}
.sp-row label{font-size:11px;color:var(--muted);}
.sp-row input,.sp-row select{background:var(--card2);border:1px solid var(--border);
  color:var(--text);border-radius:6px;padding:7px 10px;font-size:13px;width:100%;}
.sp-row input:focus{outline:none;border-color:var(--cyan);}
.sp-btns{display:flex;gap:8px;margin-top:4px;}
.sp-btns button{flex:1;padding:8px;font-size:12px;}
#testTgBtn{background:#1d4ed8;border-color:#1d4ed8;color:#fff;font-weight:600;}
#saveTgBtn{background:var(--green);border-color:var(--green);color:#000;font-weight:600;}
.sp-hint{font-size:10px;color:var(--muted);line-height:1.5;}
.sp-hint a{color:var(--cyan);}
#tgStatus{font-size:11px;padding:6px 10px;border-radius:6px;display:none;}
.tg-ok{background:#14532d;color:var(--green);}
.tg-err{background:#450a0a;color:var(--red);}

/* ── 요약 ── */
.summary{display:flex;gap:7px;padding:10px 16px;flex-wrap:wrap;}
.sc{flex:1;min-width:90px;background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:9px 12px;text-align:center;}
.sc .v{font-size:20px;font-weight:700;}
.sc .l{font-size:10px;color:var(--muted);margin-top:2px;}

/* ── 진행바 ── */
#progressBar{height:3px;background:var(--border);position:relative;overflow:hidden;}
#progressFill{height:100%;background:var(--cyan);width:0%;transition:width .3s;position:absolute;}

/* ── 필터 / 정렬 ── */
.fbar{display:flex;gap:6px;padding:6px 16px 10px;flex-wrap:wrap;align-items:center;}
.fbar span{color:var(--muted);font-size:11px;}
.fb{padding:3px 10px;border-radius:20px;font-size:11px;cursor:pointer;
  background:var(--card2);border:1px solid var(--border);color:var(--muted);}
.fb.on{color:var(--text);border-color:var(--cyan);background:#0c2040;}
.sort-sel{margin-left:auto;}

/* ── 그리드 ── */
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:12px;padding:0 16px 30px;}

/* ── 카드 ── */
.coin-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s;}
.coin-card:hover{border-color:#2d4a6a;}
.coin-card.STRONG_BUY {border-color:var(--green);box-shadow:0 0 14px #22c55e22;}
.coin-card.STRONG_SELL{border-color:var(--red);  box-shadow:0 0 14px #ef444422;}
.coin-card.BUY {border-color:#16a34a;}
.coin-card.SELL{border-color:#dc2626;}

.ch{display:flex;align-items:flex-start;gap:10px;padding:11px 13px 8px;border-bottom:1px solid var(--border);}
.ci{width:32px;height:32px;border-radius:50%;background:var(--card2);display:flex;
  align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--cyan);flex-shrink:0;}
.cinfo{flex:1;min-width:0;}
.cnrow{display:flex;align-items:baseline;gap:6px;}
.cname{font-weight:700;font-size:14px;}
.cname-ko{font-size:11px;color:var(--muted);}
.cpricerow{font-size:12px;margin-top:2px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
.usd{color:var(--text);font-family:monospace;font-weight:600;}
.krw{color:var(--yellow);font-family:monospace;font-size:11px;}
.pct24{font-size:10px;font-family:monospace;}
.cex-row{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap;}
.cex{font-size:10px;padding:1px 5px;border-radius:3px;border:1px solid;}
.cex-u{background:#06113a;color:#60a5fa;border-color:#1d4ed8;}
.cex-b{background:#1a0a00;color:#fb923c;border-color:#c2410c;}
.cex-c{background:#0d1f0d;color:#4ade80;border-color:#15803d;}
.sbadge{padding:4px 9px;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap;}
.sig-STRONG_BUY {background:#14532d;color:#4ade80;border:1px solid var(--green);}
.sig-BUY        {background:#052e16;color:var(--green);border:1px solid #166534;}
.sig-HOLD       {background:#422006;color:var(--yellow);border:1px solid #854d0e;}
.sig-SELL       {background:#450a0a;color:#fca5a5;border:1px solid #991b1b;}
.sig-STRONG_SELL{background:#7f1d1d;color:#fecaca;border:1px solid var(--red);}

/* 차트 */
.chart-wrap{height:150px;background:#0d1520;}

/* 카드 바디 */
.cb{padding:10px 13px;display:flex;flex-direction:column;gap:7px;}

/* 진입/손절/목표가 박스 */
.entry-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
.eg-box{border-radius:6px;padding:6px 8px;font-size:11px;}
.eg-entry{background:#0a1628;border:1px solid var(--blue);}
.eg-sl   {background:#1a0000;border:1px solid #3f0000;}
.eg-tp   {background:#001a00;border:1px solid #003f00;}
.eg-box .el{font-size:10px;margin-bottom:2px;}
.eg-entry .el{color:var(--blue);}
.eg-sl    .el{color:var(--red);}
.eg-tp    .el{color:var(--green);}
.eg-box .ep{font-weight:700;font-family:monospace;}
.eg-entry .ep{color:#93c5fd;}
.eg-sl    .ep{color:#fca5a5;}
.eg-tp    .ep{color:#86efac;}
.eg-box .ek{font-size:10px;font-family:monospace;margin-top:1px;}
.eg-entry .ek{color:#3b82f6;}
.eg-sl    .ek{color:#ef4444;}
.eg-tp    .ek{color:#22c55e;}
.eg-box .err{font-size:10px;color:var(--muted);}

/* 스코어 바 */
.srow{display:flex;align-items:center;gap:6px;}
.slbl{font-size:10px;color:var(--muted);width:36px;flex-shrink:0;}
.strk{flex:1;height:5px;background:#1e293b;border-radius:3px;overflow:hidden;}
.sfil{height:100%;border-radius:3px;transition:width .4s;}
.sval{font-size:11px;font-family:monospace;width:46px;text-align:right;flex-shrink:0;}

/* 지표 */
.igrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;}
.ic{background:var(--card2);border-radius:5px;padding:4px 7px;}
.in{font-size:10px;color:var(--muted);}
.iv{font-size:12px;font-weight:600;margin-top:1px;}

/* 패턴 */
.ptags{display:flex;flex-wrap:wrap;gap:3px;}
.pt{font-size:10px;padding:2px 6px;border-radius:4px;border:1px solid;font-weight:500;}
.pt-b{background:#052e16;color:#4ade80;border-color:#166534;}
.pt-s{background:#450a0a;color:#fca5a5;border-color:#991b1b;}
.pt-n{background:#1c1917;color:var(--muted);border-color:#292524;}

/* 지지저항 */
.sr{display:flex;gap:4px;}
.sri{flex:1;background:var(--card2);border-radius:5px;padding:5px 7px;}
.sri .l{font-size:10px;color:var(--muted);}
.sup{color:var(--green);font-family:monospace;font-size:10px;}
.res{color:var(--red);font-family:monospace;font-size:10px;}

/* 세부 */
details{font-size:11px;}
details summary{cursor:pointer;color:var(--muted);padding:2px 0;user-select:none;}
.dlist{margin-top:4px;display:flex;flex-direction:column;gap:2px;max-height:130px;overflow-y:auto;}
.di{display:flex;gap:4px;align-items:baseline;}
.dn{color:var(--muted);font-size:10px;width:54px;flex-shrink:0;}
.dr{flex:1;}
.ds{font-family:monospace;width:36px;text-align:right;flex-shrink:0;}

/* 로딩 */
.loading{text-align:center;padding:50px;color:var(--muted);grid-column:1/-1;}
.spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--cyan);
  border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 10px;}
@keyframes sp{to{transform:rotate(360deg);}}

/* 토스트 */
#toast{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:5px;}
.ti{padding:9px 14px;border-radius:8px;font-size:12px;font-weight:600;
  animation:si .3s ease;max-width:280px;}
.tb{background:#14532d;color:#4ade80;border:1px solid var(--green);}
.ts{background:#7f1d1d;color:#fecaca;border:1px solid var(--red);}
@keyframes si{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}

@media(max-width:600px){#grid{grid-template-columns:1fr;padding:0 10px 20px;}}
</style>
</head>
<body>

<!-- 설정 패널 -->
<div id="settingPanel">
  <div class="sp-box">
    <h2>⚙ 설정</h2>
    <div class="sp-row">
      <label>텔레그램 Bot Token</label>
      <input id="tgToken" type="password" placeholder="1234567890:AAxxxxxx...">
    </div>
    <div class="sp-row">
      <label>텔레그램 Chat ID (채널: -100xxx, 개인: 숫자)</label>
      <input id="tgChat" type="text" placeholder="-1001234567890">
    </div>
    <div class="sp-row">
      <label>신호 전송 조건</label>
      <select id="tgMinSig">
        <option value="STRONG_BUY,STRONG_SELL">강력매수 / 강력매도만</option>
        <option value="BUY,SELL,STRONG_BUY,STRONG_SELL" selected>매수 / 매도 이상</option>
        <option value="ALL">전체 (관망 포함)</option>
      </select>
    </div>
    <div class="sp-row">
      <label>스캔 종목 수 (상위 거래량 기준)</label>
      <select id="scanCount">
        <option value="30">상위 30개</option>
        <option value="50" selected>상위 50개</option>
        <option value="100">상위 100개</option>
        <option value="200">상위 200개</option>
      </select>
    </div>
    <div class="sp-hints sp-hint">
      📌 Bot 만들기: <a href="https://t.me/BotFather" target="_blank">@BotFather</a> → /newbot<br>
      📌 Chat ID 확인: Bot을 채널 관리자로 추가 후 <a href="https://t.me/userinfobot" target="_blank">@userinfobot</a><br>
      📌 채널에 Bot을 관리자로 추가해야 메시지 전송 가능
    </div>
    <div id="tgStatus"></div>
    <div class="sp-btns">
      <button id="testTgBtn" onclick="testTelegram()">텔레그램 테스트 전송</button>
      <button id="saveTgBtn" onclick="saveSettings()">저장 후 닫기</button>
      <button onclick="closeSettings()">닫기</button>
    </div>
  </div>
</div>

<header>
  <h1>&#9719; 코인 실시간 매매 신호</h1>
  <div class="hr">
    <span id="krwRate">환율 로딩중...</span>
    <select id="tfSel"><option value="15m">15분봉</option><option value="1h" selected>1시간봉</option><option value="4h">4시간봉</option><option value="1d">일봉</option></select>
    <select id="ivSel"><option value="0">수동</option><option value="30">30초</option><option value="60" selected>1분</option><option value="180">3분</option><option value="300">5분</option></select>
    <button id="scanBtn" onclick="startScan()">▶ 스캔</button>
    <button id="settingBtn" onclick="openSettings()">⚙</button>
    <span id="status" class="st-ok">대기</span>
    <span id="clock"></span>
  </div>
</header>

<div id="progressBar"><div id="progressFill"></div></div>

<div class="summary">
  <div class="sc"><div class="v" id="s0" style="color:var(--cyan)">-</div><div class="l">스캔종목</div></div>
  <div class="sc"><div class="v" id="s1" style="color:var(--green)">-</div><div class="l">강력매수</div></div>
  <div class="sc"><div class="v" id="s2" style="color:#4ade80">-</div><div class="l">매수</div></div>
  <div class="sc"><div class="v" id="s3" style="color:var(--yellow)">-</div><div class="l">관망</div></div>
  <div class="sc"><div class="v" id="s4" style="color:#fca5a5">-</div><div class="l">매도</div></div>
  <div class="sc"><div class="v" id="s5" style="color:var(--red)">-</div><div class="l">강력매도</div></div>
  <div class="sc"><div class="v" id="s6" style="color:var(--muted)">-</div><div class="l">스캔시간</div></div>
  <div class="sc"><div class="v" id="s7" style="color:var(--purple)">-</div><div class="l">TG전송</div></div>
</div>

<div class="fbar">
  <span>필터:</span>
  <button class="fb on" data-f="ALL"         onclick="setF(this)">전체</button>
  <button class="fb"    data-f="STRONG_BUY"  onclick="setF(this)">강력매수</button>
  <button class="fb"    data-f="BUY"         onclick="setF(this)">매수</button>
  <button class="fb"    data-f="HOLD"        onclick="setF(this)">관망</button>
  <button class="fb"    data-f="SELL"        onclick="setF(this)">매도</button>
  <button class="fb"    data-f="STRONG_SELL" onclick="setF(this)">강력매도</button>
  <select class="sort-sel" id="sortSel" onchange="renderGrid(lastResults)">
    <option value="signal">신호강도순</option>
    <option value="score">점수순</option>
    <option value="vol">거래량순</option>
    <option value="change">등락률순</option>
  </select>
</div>

<div id="grid"><div class="loading"><div class="spin"></div>스캔 버튼을 눌러 시작하세요</div></div>
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════
// 한국 거래소 상장 정보
// ══════════════════════════════════════════════
const KR_EX = {
  BTC:{ko:'비트코인',u:1,b:1,c:1},ETH:{ko:'이더리움',u:1,b:1,c:1},
  XRP:{ko:'리플',u:1,b:1,c:1},SOL:{ko:'솔라나',u:1,b:1,c:1},
  ADA:{ko:'에이다',u:1,b:1,c:0},DOGE:{ko:'도지코인',u:1,b:1,c:0},
  DOT:{ko:'폴카닷',u:1,b:1,c:0},LINK:{ko:'체인링크',u:1,b:1,c:0},
  LTC:{ko:'라이트코인',u:1,b:1,c:1},AVAX:{ko:'아발란체',u:1,b:1,c:0},
  MATIC:{ko:'폴리곤',u:1,b:1,c:0},ATOM:{ko:'코스모스',u:1,b:1,c:0},
  TRX:{ko:'트론',u:1,b:1,c:0},ETC:{ko:'이더리움클래식',u:1,b:1,c:1},
  BCH:{ko:'비트코인캐시',u:1,b:1,c:1},NEAR:{ko:'니어프로토콜',u:1,b:1,c:0},
  ICP:{ko:'인터넷컴퓨터',u:1,b:0,c:0},FIL:{ko:'파일코인',u:1,b:1,c:0},
  SAND:{ko:'샌드박스',u:1,b:1,c:0},MANA:{ko:'디센트럴랜드',u:1,b:1,c:0},
  APT:{ko:'앱토스',u:1,b:1,c:0},ARB:{ko:'아비트럼',u:1,b:1,c:0},
  OP:{ko:'옵티미즘',u:1,b:0,c:0},SUI:{ko:'수이',u:1,b:1,c:0},
  SEI:{ko:'세이',u:1,b:0,c:0},INJ:{ko:'인젝티브',u:1,b:0,c:0},
  PEPE:{ko:'페페',u:1,b:0,c:0},WIF:{ko:'도그위프햇',u:1,b:0,c:0},
  BONK:{ko:'봉크',u:1,b:0,c:0},JUP:{ko:'주피터',u:1,b:0,c:0},
  PYTH:{ko:'피스',u:1,b:0,c:0},W:{ko:'웜홀',u:1,b:0,c:0},
  FLOKI:{ko:'플로키',u:1,b:0,c:0},BEAM:{ko:'빔',u:1,b:0,c:0},
  STPT:{ko:'스타트파이',u:1,b:0,c:0},ALGO:{ko:'알고랜드',u:1,b:1,c:0},
  VET:{ko:'비체인',u:1,b:1,c:0},EOS:{ko:'이오스',u:1,b:1,c:0},
  XLM:{ko:'스텔라루멘',u:1,b:1,c:0},THETA:{ko:'세타',u:1,b:0,c:0},
};

const API='https://api.binance.com/api/v3';
const TG_API='https://api.telegram.org/bot';

let curFilter='ALL', scanTimer=null, lastResults=[], prevSigs={};
let usdKrw=1380, tgSentCount=0;
let cfg={token:'',chatId:'',minSig:'BUY,SELL,STRONG_BUY,STRONG_SELL',scanCount:50};

// ══════════════════════════════════════════════
// 설정 저장/불러오기
// ══════════════════════════════════════════════
function loadSettings(){
  const s=localStorage.getItem('coinSignalCfg');
  if(s)cfg=JSON.parse(s);
  document.getElementById('tgToken').value=cfg.token||'';
  document.getElementById('tgChat').value=cfg.chatId||'';
  document.getElementById('tgMinSig').value=cfg.minSig||'BUY,SELL,STRONG_BUY,STRONG_SELL';
  document.getElementById('scanCount').value=cfg.scanCount||50;
}
function saveSettings(){
  cfg.token=document.getElementById('tgToken').value.trim();
  cfg.chatId=document.getElementById('tgChat').value.trim();
  cfg.minSig=document.getElementById('tgMinSig').value;
  cfg.scanCount=parseInt(document.getElementById('scanCount').value);
  localStorage.setItem('coinSignalCfg',JSON.stringify(cfg));
  closeSettings();
}
function openSettings(){document.getElementById('settingPanel').classList.add('open');}
function closeSettings(){document.getElementById('settingPanel').classList.remove('open');}

// ══════════════════════════════════════════════
// 텔레그램
// ══════════════════════════════════════════════
async function sendTelegram(text){
  if(!cfg.token||!cfg.chatId)return false;
  try{
    const r=await fetch(`${TG_API}${cfg.token}/sendMessage`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chat_id:cfg.chatId,text,parse_mode:'HTML',disable_web_page_preview:true})
    });
    const d=await r.json();
    return d.ok===true;
  }catch(e){console.warn('TG error',e);return false;}
}

async function testTelegram(){

function buildTgMessage(r,meta){
  const sigEmoji={'STRONG_BUY':'🚀','BUY':'📈','SELL':'📉','STRONG_SELL':'🔥','HOLD':'⏸'}[r.signal]||'';
  const sigLabel={'STRONG_BUY':'강력매수','BUY':'매수','SELL':'매도','STRONG_SELL':'강력매도','HOLD':'관망'}[r.signal]||r.signal;
  const name=`${r.sym.replace('USDT','')}${meta.ko?` (${meta.ko})`:''}`;
  const kr=[meta.u?'업비트':'',meta.b?'빗썸':'',meta.c?'코인원':''].filter(Boolean).join('/');
  const krStr=kr?`🇰🇷 국내상장: ${kr}`:'🚫 국내 미상장';

  const patList=Object.values(r.det).map(p=>p.label).join(', ')||'없음';

  let lines=[
    `${sigEmoji} <b>[${sigLabel}] ${name}</b>`,
    `━━━━━━━━━━━━━━━━`,
    `💰 현재가: $${fp(r.price)} (${fpKrw(r.price)})`,
    `📊 종합점수: ${r.score>=0?'+':''}${r.score.toFixed(3)} | 기술:${r.tech.toFixed(2)} 거래량:${r.vol.toFixed(2)} 패턴:${r.pat.toFixed(2)}`,
    `━━━━━━━━━━━━━━━━`,
  ];
  if(r.entry) lines.push(`🎯 진입가: $${fp(r.entry)} (${fpKrw(r.entry)})`);
  if(r.sl)    lines.push(`🛑 손절가: $${fp(r.sl)} (${fpKrw(r.sl)}) | RR: 1:${((Math.abs(r.tp-r.price))/(Math.abs(r.sl-r.price)+1e-9)).toFixed(1)}`);
  if(r.tp)    lines.push(`🎁 목표가: $${fp(r.tp)} (${fpKrw(r.tp)})`);
  lines.push(`━━━━━━━━━━━━━━━━`);
  lines.push(`📈 RSI: ${isNaN(r.ind.rsi)?'—':r.ind.rsi.toFixed(1)} | Stoch: ${isNaN(r.ind.stK)?'—':r.ind.stK.toFixed(0)} | MFI: ${isNaN(r.ind.mfi)?'—':r.ind.mfi.toFixed(0)}`);
  lines.push(`📦 거래량: ${isNaN(r.ind.volR)?'—':r.ind.volR.toFixed(2)+'x'} | MACD: ${(r.ind.macd-r.ind.macdSig)>0?'양':'음'}`);
  if(patList!=='없음') lines.push(`🔍 패턴: ${patList}`);
  lines.push(krStr);
  lines.push(`⏰ ${new Date().toLocaleString('ko-KR')}`);
  return lines.join('\n');
}

// ══════════════════════════════════════════════
// 지표 계산
// ══════════════════════════════════════════════
const ema=(a,n)=>{const k=2/(n+1),out=new Array(a.length).fill(NaN);let s=false,p=0;
  for(let i=0;i<a.length;i++){if(!s){if(i>=n-1){let sum=0;for(let j=i-n+1;j<=i;j++)sum+=a[j];p=sum/n;out[i]=p;s=true;}}
  else{p=a[i]*k+p*(1-k);out[i]=p;}}return out;};
const sma=(a,n)=>a.map((_,i)=>i<n-1?NaN:a.slice(i-n+1,i+1).reduce((s,v)=>s+v,0)/n);

function calcRSI(c,n=14){const out=new Array(c.length).fill(NaN);if(c.length<n+1)return out;
  let ag=0,al=0;for(let i=1;i<=n;i++){const d=c[i]-c[i-1];if(d>0)ag+=d;else al-=d;}ag/=n;al/=n;
  out[n]=al===0?100:100-100/(1+ag/al);
  for(let i=n+1;i<c.length;i++){const d=c[i]-c[i-1];ag=(ag*(n-1)+Math.max(d,0))/n;al=(al*(n-1)+Math.max(-d,0))/n;
    out[i]=al===0?100:100-100/(1+ag/al);}return out;}

function calcMACD(c,f=12,sl=26,sg=9){const ef=ema(c,f),es=ema(c,sl);
  const m=c.map((_,i)=>isNaN(ef[i])||isNaN(es[i])?NaN:ef[i]-es[i]);
  const sig=ema(m.map(v=>isNaN(v)?0:v),sg).map((v,i)=>isNaN(m[i])?NaN:v);
  return{m,sig,hist:m.map((v,i)=>isNaN(v)||isNaN(sig[i])?NaN:v-sig[i])};}

function calcBB(c,n=20,k=2){const mid=sma(c,n);
  const std=c.map((_,i)=>{if(i<n-1)return NaN;const s=c.slice(i-n+1,i+1),m=s.reduce((a,b)=>a+b,0)/n;
    return Math.sqrt(s.reduce((a,b)=>a+(b-m)**2,0)/n);});
  return{u:mid.map((m,i)=>m+k*std[i]),m:mid,l:mid.map((m,i)=>m-k*std[i])};}

function calcStoch(h,l,c,k=14,d=3){
  const kl=c.map((cv,i)=>{if(i<k-1)return NaN;const hs=h.slice(i-k+1,i+1),ls=l.slice(i-k+1,i+1);
    const hh=Math.max(...hs),ll=Math.min(...ls);return hh===ll?50:100*(cv-ll)/(hh-ll);});
  const dl=sma(kl.map(v=>isNaN(v)?0:v),d).map((v,i)=>isNaN(kl[i])?NaN:v);return{k:kl,d:dl};}

function calcATR(h,l,c,n=14){const tr=c.map((cv,i)=>i===0?h[i]-l[i]:Math.max(h[i]-l[i],Math.abs(h[i]-c[i-1]),Math.abs(l[i]-c[i-1])));return sma(tr,n);}
function calcOBV(c,v){let ob=0;return c.map((cv,i)=>{if(i>0)ob+=(cv>c[i-1]?1:cv<c[i-1]?-1:0)*v[i];return ob;});}
function calcMFI(h,l,c,v,n=14){const tp=c.map((cv,i)=>(h[i]+l[i]+cv)/3),rmf=tp.map((t,i)=>t*v[i]);
  return tp.map((t,i)=>{if(i<n)return NaN;let pos=0,neg=0;
    for(let j=i-n+1;j<=i;j++){if(tp[j]>tp[j-1]||j===0)pos+=rmf[j];else neg+=rmf[j];}
    return neg===0?100:100-100/(1+pos/neg);});}
function calcVWAP(h,l,c,v){let ctv=0,cv2=0;return c.map((cv,i)=>{const tp=(h[i]+l[i]+cv)/3;ctv+=tp*v[i];cv2+=v[i];return cv2===0?tp:ctv/cv2;});}

// ══════════════════════════════════════════════
// 패턴
// ══════════════════════════════════════════════
function swings(arr,w=5){const H=[],L=[];
  for(let i=w;i<arr.length-w;i++){const seg=arr.slice(i-w,i+w+1);
    if(arr[i]===Math.max(...seg)&&arr[i]>arr[i-1]&&arr[i]>arr[i+1])H.push([i,arr[i]]);
    if(arr[i]===Math.min(...seg)&&arr[i]<arr[i-1]&&arr[i]<arr[i+1])L.push([i,arr[i]]);
  }return{H,L};}
function slp(pts){if(pts.length<2)return 0;const n=pts.length,sx=pts.reduce((a,p)=>a+p[0],0),sy=pts.reduce((a,p)=>a+p[1],0),sxy=pts.reduce((a,p)=>a+p[0]*p[1],0),sx2=pts.reduce((a,p)=>a+p[0]*p[0],0);return(n*sxy-sx*sy)/(n*sx2-sx*sx+1e-9);}

function detectPat(close,atr){
  const{H,L}=swings(close,4),det={};
  if(L.length>=2){const[,p1]=L[L.length-2],[i2,p2]=L[L.length-1],[i1]=L[L.length-2];if(i2-i1>=4&&Math.abs(p1-p2)/p1<0.025)det.db={label:'이중 바닥',bull:true};}
  if(H.length>=2){const[i1,p1]=H[H.length-2],[i2,p2]=H[H.length-1];if(i2-i1>=4&&Math.abs(p1-p2)/p1<0.025)det.dt={label:'이중 천장',bull:false};}
  if(L.length>=3){const[i1,p1]=L[L.length-3],[i2,p2]=L[L.length-2],[i3,p3]=L[L.length-1];const a=(p1+p2+p3)/3;if([p1,p2,p3].every(p=>Math.abs(p-a)/a<0.03)&&i2>i1+3&&i3>i2+3)det.tb={label:'삼중 바닥',bull:true};}
  if(H.length>=3){const[i1,p1]=H[H.length-3],[i2,p2]=H[H.length-2],[i3,p3]=H[H.length-1];const a=(p1+p2+p3)/3;if([p1,p2,p3].every(p=>Math.abs(p-a)/a<0.03)&&i2>i1+3&&i3>i2+3)det.tt={label:'삼중 천장',bull:false};}
  if(H.length>=3){const[i1,p1]=H[H.length-3],[i2,p2]=H[H.length-2],[i3,p3]=H[H.length-1];if(i2-i1>=3&&i3-i2>=3&&p2>p1&&p2>p3&&Math.abs(p1-p3)/p1<0.04)det.hs={label:'머리어깨',bull:false};}
  if(L.length>=3){const[i1,p1]=L[L.length-3],[i2,p2]=L[L.length-2],[i3,p3]=L[L.length-1];if(i2-i1>=3&&i3-i2>=3&&p2<p1&&p2<p3&&Math.abs(p1-p3)/p1<0.04)det.ihs={label:'역머리어깨',bull:true};}
  if(H.length>=2&&L.length>=2){const hS=slp(H.slice(-3)),lS=slp(L.slice(-3)),ref=H[H.length-1][1],t=ref*0.002;
    if(hS<-t&&lS>t)det.triS={label:'대칭삼각형',bull:null};
    else if(Math.abs(hS)<=t&&lS>t)det.triA={label:'어센딩삼각형',bull:true};
    else if(hS<-t&&Math.abs(lS)<=t)det.triD={label:'디센딩삼각형',bull:false};
    if(hS<0&&lS<0&&lS>hS*1.2)det.wF={label:'하락쐐기',bull:true};
    if(hS>0&&lS>0&&hS>lS*1.2)det.wR={label:'상승쐐기',bull:false};}
  const n=close.length;
  if(n>25){const pl=close.slice(n-25,n-15),fl=close.slice(n-15);const pm=(pl[pl.length-1]-pl[0])/pl[0],fm=(fl[fl.length-1]-fl[0])/fl[0];
    if(pm>0.04&&fm>-0.04&&fm<0.01)det.bf={label:'상승깃발',bull:true};
    if(pm<-0.04&&fm<0.04&&fm>-0.01)det.bea={label:'하락깃발',bull:false};}
  if(n>55){const cup=close.slice(n-55,n-10),h2=close.slice(n-10);const cs=cup[0],ce=cup[cup.length-1],cb=Math.min(...cup);
    if(Math.abs(cs-ce)/cs<0.05){const dep=(cs-cb)/cs;if(dep>0.08){const hd=(Math.max(...h2)-h2[h2.length-1])/Math.max(...h2);if(hd>0&&hd<dep*0.5)det.ch={label:'컵앤핸들',bull:true};}}}
  if(n>30){const sub=close.slice(n-30),la=sub.slice(0,5).reduce((a,b)=>a+b,0)/5,ra=sub.slice(-5).reduce((a,b)=>a+b,0)/5,mid2=15;
    if(Math.min(...sub.slice(mid2-3,mid2+3))<la*0.97&&ra>la*1.01)det.rb={label:'둥근바닥',bull:true};
    if(Math.max(...sub.slice(mid2-3,mid2+3))>la*1.03&&ra<la*0.99)det.rt={label:'둥근천장',bull:false};}
  const sr=calcSR(close,atr);
  return{det,sr};}

function calcSR(close,atr){const{H,L}=swings(close,5);const cur=close[close.length-1],tol=atr*0.5;
  const cluster=pts=>{const lv=[];for(const[,p]of pts){const f=lv.find(l=>Math.abs(l.p-p)<tol);
    if(f){f.p=(f.p*f.n+p)/(f.n+1);f.n++;}else lv.push({p,n:1});}return lv.filter(l=>l.n>=2).map(l=>l.p);};
  return{sup:cluster(L).filter(p=>p<cur*1.05).sort((a,b)=>b-a).slice(0,3),
    res:cluster(H).filter(p=>p>cur*0.95).sort((a,b)=>a-b).slice(0,3)};}

// ══════════════════════════════════════════════
// 진입가 계산
// ══════════════════════════════════════════════
function calcEntry(signal, price, sr, atr){
  const buf=atr*0.1;
  if(signal==='STRONG_BUY'||signal==='BUY'){
    // 매수: 가장 가까운 저항선 바로 아래 또는 현재가 소폭 위 (돌파 진입)
    const nearRes=sr.res.find(r=>r>price);
    if(nearRes&&nearRes-price<atr*2) return nearRes+buf; // 저항 돌파 시
    return price; // 현재가 진입
  }
  if(signal==='STRONG_SELL'||signal==='SELL'){
    // 매도: 가장 가까운 지지선 바로 위 또는 현재가 소폭 아래 (이탈 진입)
    const nearSup=sr.sup.find(s=>s<price);
    if(nearSup&&price-nearSup<atr*2) return nearSup-buf; // 지지 이탈 시
    return price;
  }
  return price;
}

    else if(rsi<=30)sc.push({n:'RSI',s:0.8,w:1.0,r:`과매도 ${rsi.toFixed(1)}`});
    else if(rsi>=75)sc.push({n:'RSI',s:-1.0,w:1.2,r:`극단과매수 ${rsi.toFixed(1)}`});
    else if(rsi>=70)sc.push({n:'RSI',s:-0.8,w:1.0,r:`과매수 ${rsi.toFixed(1)}`});
    else if(rsi<45)sc.push({n:'RSI',s:0.2,w:0.4,r:`중립하단 ${rsi.toFixed(1)}`});
    else if(rsi>55)sc.push({n:'RSI',s:-0.2,w:0.4,r:`중립상단 ${rsi.toFixed(1)}`});}
  if(!isNaN(macd)&&!isNaN(prevMacd)){const pd=prevMacd-prevMacdSig,ld=macd-macdSig;
    if(pd<0&&ld>0)sc.push({n:'MACD',s:0.9,w:1.2,r:'골든크로스'});
    else if(pd>0&&ld<0)sc.push({n:'MACD',s:-0.9,w:1.2,r:'데드크로스'});
    else if(ld>0)sc.push({n:'MACD',s:0.3,w:0.6,r:'양수유지'});
    else sc.push({n:'MACD',s:-0.3,w:0.6,r:'음수유지'});}
  if(!isNaN(e9)&&!isNaN(e21)&&!isNaN(e50)){
    if(e9>e21&&e21>e50&&close>e9)sc.push({n:'EMA',s:0.7,w:1.0,r:'정배열+가격위'});
    else if(e9<e21&&e21<e50&&close<e9)sc.push({n:'EMA',s:-0.7,w:1.0,r:'역배열+가격아래'});
    else if(e9>e21)sc.push({n:'EMA',s:0.3,w:0.5,r:'단기EMA상향'});
    else sc.push({n:'EMA',s:-0.3,w:0.5,r:'단기EMA하향'});}
  if(!isNaN(bbL)&&!isNaN(bbU)){const pct=(close-bbL)/(bbU-bbL+1e-9);
    if(close<=bbL)sc.push({n:'BB',s:0.8,w:0.9,r:'하단이탈'});
    else if(close>=bbU)sc.push({n:'BB',s:-0.8,w:0.9,r:'상단이탈'});
    else if(pct<0.2)sc.push({n:'BB',s:0.4,w:0.6,r:`하단근접${(pct*100).toFixed(0)}%`});
    else if(pct>0.8)sc.push({n:'BB',s:-0.4,w:0.6,r:`상단근접${(pct*100).toFixed(0)}%`});}
  if(!isNaN(stK)&&!isNaN(stD)){
    if(stK<20&&stK>stD)sc.push({n:'Stoch',s:0.7,w:0.8,r:`과매도상향 ${stK.toFixed(0)}`});
    if(stK>80&&stK<stD)sc.push({n:'Stoch',s:-0.7,w:0.8,r:`과매수하향 ${stK.toFixed(0)}`});}
  return sc;}

function sVol(ind){const sc=[];
  const{volR,pUp,obvSlope,mfi,vwap,close}=ind;
  if(!isNaN(volR)){const sg=pUp?1:-1;
    if(volR>3)sc.push({n:'VOL',s:sg*1.0,w:1.3,r:`폭발(${volR.toFixed(1)}x)`});
    else if(volR>2)sc.push({n:'VOL',s:sg*0.8,w:1.1,r:`급등(${volR.toFixed(1)}x)`});
    else if(volR>1.5)sc.push({n:'VOL',s:sg*0.4,w:0.7,r:`증가(${volR.toFixed(1)}x)`});
    else if(volR<0.5)sc.push({n:'VOL',s:0.1,w:0.3,r:'급감'});}
  if(!isNaN(obvSlope)){
    if(obvSlope>0.02)sc.push({n:'OBV',s:0.6,w:0.9,r:'강한상승'});
    else if(obvSlope>0.005)sc.push({n:'OBV',s:0.3,w:0.6,r:'완만상승'});
    else if(obvSlope<-0.02)sc.push({n:'OBV',s:-0.6,w:0.9,r:'강한하락'});
    else if(obvSlope<-0.005)sc.push({n:'OBV',s:-0.3,w:0.6,r:'완만하락'});}
  if(!isNaN(mfi)){if(mfi<=20)sc.push({n:'MFI',s:0.8,w:0.9,r:`과매도 ${mfi.toFixed(0)}`});
    if(mfi>=80)sc.push({n:'MFI',s:-0.8,w:0.9,r:`과매수 ${mfi.toFixed(0)}`});}
  if(!isNaN(vwap)){const d=(close-vwap)/vwap;
    if(d>0.002)sc.push({n:'VWAP',s:0.4,w:0.6,r:`위 +${(d*100).toFixed(2)}%`});
    if(d<-0.002)sc.push({n:'VWAP',s:-0.4,w:0.6,r:`아래 ${(d*100).toFixed(2)}%`});}
  return sc;}

function sPat(det,sr,close,atr){const sc=[];
  const PM={db:{s:0.85,w:1.1},dt:{s:-0.85,w:1.1},tb:{s:0.9,w:1.2},tt:{s:-0.9,w:1.2},
    ihs:{s:0.9,w:1.2},hs:{s:-0.9,w:1.2},rb:{s:0.7,w:0.9},rt:{s:-0.7,w:0.9},
    triA:{s:0.75,w:1.0},triD:{s:-0.75,w:1.0},triS:{s:0,w:0.5},
    wF:{s:0.75,w:1.0},wR:{s:-0.75,w:1.0},bf:{s:0.8,w:1.0},bea:{s:-0.8,w:1.0},ch:{s:0.85,w:1.1}};
  for(const[k,info]of Object.entries(det)){const c=PM[k];if(c)sc.push({n:info.label,s:c.s,w:c.w,r:info.label});}
  for(const sup of(sr.sup||[]).slice(0,2)){const d=Math.abs(close-sup)/atr;
    if(d<0.3)sc.push({n:'지지선',s:0.7,w:1.0,r:`근접 ${fp(sup)}`});
    else if(d<0.8)sc.push({n:'지지선',s:0.4,w:0.6,r:`인근 ${fp(sup)}`});}
  for(const res of(sr.res||[]).slice(0,2)){const d=Math.abs(close-res)/atr;
    if(d<0.3)sc.push({n:'저항선',s:-0.7,w:1.0,r:`근접 ${fp(res)}`});
    else if(d<0.8)sc.push({n:'저항선',s:-0.4,w:0.6,r:`인근 ${fp(res)}`});}
  return sc;}

const wavg=sc=>{if(!sc.length)return 0;const tw=sc.reduce((a,s)=>a+s.w,0);return sc.reduce((a,s)=>a+s.s*s.w,0)/(tw||1);};
const classify=f=>f>=0.65?'STRONG_BUY':f>=0.35?'BUY':f<=-0.65?'STRONG_SELL':f<=-0.35?'SELL':'HOLD';

// ══════════════════════════════════════════════
// 분석
// ══════════════════════════════════════════════
async function fetchKlines(sym,interval,limit=250){
  const r=await fetch(`${API}/klines?symbol=${sym}&interval=${interval}&limit=${limit}`);
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  const d=await r.json();
  return d.map(k=>({t:k[0],o:+k[1],h:+k[2],l:+k[3],c:+k[4],v:+k[5]}));}

async function analyze(symInfo,tf){
  const{sym,change24h,volume24h}=symInfo;
  const klines=await fetchKlines(sym,tf,250);
  const n=klines.length,i=n-1,ip=n-2;
  const cl=klines.map(k=>k.c),hi=klines.map(k=>k.h),lo=klines.map(k=>k.l),vo=klines.map(k=>k.v);

  const rsiA=calcRSI(cl),macdO=calcMACD(cl),bbO=calcBB(cl),stO=calcStoch(hi,lo,cl);
  const e9A=ema(cl,9),e21A=ema(cl,21),e50A=ema(cl,50);
  const atrA=calcATR(hi,lo,cl),obvA=calcOBV(cl,vo),mfiA=calcMFI(hi,lo,cl,vo),vwapA=calcVWAP(hi,lo,cl,vo);
  const vma=sma(vo,20);
  const atr=atrA[i]||cl[i]*0.01;
  const volR=vma[i]?vo[i]/vma[i]:NaN;
  const obvSlope=obvA[ip]?(obvA[i]-obvA[i-4])/(Math.abs(obvA[i-4])+1e-9):NaN;

  const ind={close:cl[i],rsi:rsiA[i],macd:macdO.m[i],macdSig:macdO.sig[i],
    prevMacd:macdO.m[ip],prevMacdSig:macdO.sig[ip],e9:e9A[i],e21:e21A[i],e50:e50A[i],
    bbU:bbO.u[i],bbL:bbO.l[i],bbM:bbO.m[i],stK:stO.k[i],stD:stO.d[i],atr,
    volR,pUp:cl[i]>cl[ip],obvSlope,mfi:mfiA[i],vwap:vwapA[i]};

  const{det,sr}=detectPat(cl,atr);
  const tSc=sTech(ind),vSc=sVol(ind),pSc=sPat(det,sr,cl[i],atr);
  const t=wavg(tSc),v=wavg(vSc),p=wavg(pSc);
  const final=t*0.40+v*0.30+p*0.30;
  const signal=classify(final);
  const entry=calcEntry(signal,cl[i],sr,atr);
  const sl=signal.includes('BUY')?cl[i]-atr*1.5:signal.includes('SELL')?cl[i]+atr*1.5:null;
  const tp=signal.includes('BUY')?cl[i]+atr*3.0:signal.includes('SELL')?cl[i]-atr*3.0:null;

  return{sym,signal,score:final,price:cl[i],atr,change24h,volume24h,
    tech:t,vol:v,pat:p,ind,det,sr,entry,sl,tp,
    details:{tech:tSc,vol:vSc,pat:pSc},klines:klines.slice(-80)};}

// ══════════════════════════════════════════════
// 유틸
// ══════════════════════════════════════════════
function fp(p){if(p>=1000)return p.toLocaleString('en-US',{maximumFractionDigits:2});if(p>=1)return p.toFixed(4);return p.toFixed(6);}
function fpKrw(p){const w=p*usdKrw;if(w>=100000000)return`₩${(w/100000000).toFixed(2)}억`;if(w>=1000000)return`₩${(w/1000000).toFixed(0)}백만`;if(w>=1000)return`₩${Math.round(w).toLocaleString('ko-KR')}`;return`₩${w.toFixed(0)}`;}
const sigColor=s=>s>=0.3?'var(--green)':s<=-0.3?'var(--red)':'var(--yellow)';
function sBar(score,lbl){const pct=Math.round(((score+1)/2)*100),col=sigColor(score);
  return`<div class="srow"><span class="slbl">${lbl}</span><div class="strk"><div class="sfil" style="width:${pct}%;background:${col}"></div></div><span class="sval" style="color:${col}">${score>=0?'+':''}${score.toFixed(3)}</span></div>`;}

// ══════════════════════════════════════════════
// 카드 렌더
// ══════════════════════════════════════════════
function renderCard(r){
  const base=r.sym.replace('USDT','');
  const meta=KR_EX[base]||{ko:'',u:0,b:0,c:0};
  const sig=r.signal,label=sig.replace('_',' ');
  const pct24=r.change24h;
  const pctColor=pct24>0?'var(--green)':pct24<0?'var(--red)':'var(--muted)';

  const exBadges=[
    meta.u?`<span class="cex cex-u">업비트</span>`:'',
    meta.b?`<span class="cex cex-b">빗썸</span>`:'',
    meta.c?`<span class="cex cex-c">코인원</span>`:'',
  ].join('');

  const patTags=Object.entries(r.det).map(([,info])=>{
    const c=info.bull===true?'pt-b':info.bull===false?'pt-s':'pt-n';
    return`<span class="pt ${c}">${info.label}</span>`;}).join('');

  // 진입/손절/목표가
  const entryHtml=r.sl?`<div class="entry-grid">
    <div class="eg-box eg-entry">
      <div class="el">진입가</div>
      <div class="ep">${fp(r.entry)}</div>
      <div class="ek">${fpKrw(r.entry)}</div>
    </div>
    <div class="eg-box eg-sl">
      <div class="el">손절가 <span style="color:var(--muted);font-size:9px">-${(Math.abs(r.price-r.sl)/r.price*100).toFixed(1)}%</span></div>
      <div class="ep">${fp(r.sl)}</div>
      <div class="ek">${fpKrw(r.sl)}</div>
    </div>
    <div class="eg-box eg-tp">
      <div class="el">목표가 <span style="color:var(--muted);font-size:9px">+${(Math.abs(r.tp-r.price)/r.price*100).toFixed(1)}%</span></div>
      <div class="ep">${fp(r.tp)}</div>
      <div class="ek">${fpKrw(r.tp)}</div>
    </div>
  </div>`:'';

  const srHtml=`<div class="sr">
    <div class="sri"><div class="l">지지선</div>
      ${(r.sr.sup||[]).slice(0,2).map(p=>`<div class="sup">${fp(p)} <span style="color:var(--yellow);font-size:9px">${fpKrw(p)}</span></div>`).join('')||'<div class="sup" style="color:var(--muted)">—</div>'}
    </div>
    <div class="sri"><div class="l">저항선</div>
      ${(r.sr.res||[]).slice(0,2).map(p=>`<div class="res">${fp(p)} <span style="color:var(--yellow);font-size:9px">${fpKrw(p)}</span></div>`).join('')||'<div class="res" style="color:var(--muted)">—</div>'}
    </div>
  </div>`;

  const rsi=r.ind.rsi,stK=r.ind.stK,mfi=r.ind.mfi,macd=r.ind.macd;
  const bbPct=(!isNaN(r.ind.bbL)&&!isNaN(r.ind.bbU))?((r.price-r.ind.bbL)/(r.ind.bbU-r.ind.bbL+1e-9)*100).toFixed(0)+'%':'—';
  const indHtml=`<div class="igrid">
    <div class="ic"><div class="in">RSI(14)</div><div class="iv" style="color:${!isNaN(rsi)&&rsi<=30?'var(--green)':!isNaN(rsi)&&rsi>=70?'var(--red)':'var(--text)'}">${isNaN(rsi)?'—':rsi.toFixed(1)}</div></div>
    <div class="ic"><div class="in">Stoch K</div><div class="iv" style="color:${!isNaN(stK)&&stK<20?'var(--green)':!isNaN(stK)&&stK>80?'var(--red)':'var(--text)'}">${isNaN(stK)?'—':stK.toFixed(1)}</div></div>
    <div class="ic"><div class="in">MFI</div><div class="iv" style="color:${!isNaN(mfi)&&mfi<=20?'var(--green)':!isNaN(mfi)&&mfi>=80?'var(--red)':'var(--text)'}">${isNaN(mfi)?'—':mfi.toFixed(1)}</div></div>
    <div class="ic"><div class="in">MACD</div><div class="iv" style="color:${!isNaN(macd)&&(macd-r.ind.macdSig)>0?'var(--green)':'var(--red)'}">${isNaN(macd)?'—':(macd>=0?'+':'')+macd.toFixed(4)}</div></div>
    <div class="ic"><div class="in">BB %B</div><div class="iv">${bbPct}</div></div>
    <div class="ic"><div class="in">거래량비</div><div class="iv" style="color:${!isNaN(r.ind.volR)&&r.ind.volR>2?'var(--orange)':'var(--text)'}">${isNaN(r.ind.volR)?'—':r.ind.volR.toFixed(2)+'x'}</div></div>
  </div>`;

  const allD=[...r.details.tech,...r.details.vol,...r.details.pat];
  const detRows=allD.map(d=>{const c=d.s>0?'var(--green)':d.s<0?'var(--red)':'var(--muted)';
    return`<div class="di"><span class="dn">${d.n}</span><span class="dr">${d.r}</span><span class="ds" style="color:${c}">${d.s>=0?'+':''}${d.s.toFixed(2)}</span></div>`;}).join('');

  return`<div class="coin-card ${sig}" id="card-${r.sym}">
    <div class="ch">
      <div class="ci">${base.slice(0,4)}</div>
      <div class="cinfo">
        <div class="cnrow"><span class="cname">${base}/USDT</span><span class="cname-ko">${meta.ko||''}</span></div>
        <div class="cpricerow">
          <span class="usd">$${fp(r.price)}</span>
          <span class="krw">${fpKrw(r.price)}</span>
          <span class="pct24" style="color:${pctColor}">${pct24>=0?'+':''}${pct24.toFixed(2)}%</span>
        </div>
        <div class="cex-row">${exBadges||`<span style="font-size:10px;color:var(--muted)">국내미상장</span>`}</div>
      </div>
      <span class="sbadge sig-${sig}">${label}</span>
    </div>
    <div class="chart-wrap" id="chart-${r.sym}"></div>
    <div class="cb">
      ${sBar(r.score,'종합')}${sBar(r.tech,'기술')}${sBar(r.vol,'거래량')}${sBar(r.pat,'패턴')}
      ${indHtml}
      ${patTags?`<div class="ptags">${patTags}</div>`:''}
      ${entryHtml}
      ${srHtml}
      ${allD.length?`<details><summary>세부신호 ${allD.length}개 ▸</summary><div class="dlist">${detRows}</div></details>`:''}
    </div>
  </div>`;}

// ══════════════════════════════════════════════
// 차트
// ══════════════════════════════════════════════
function drawChart(r){
  const el=document.getElementById(`chart-${r.sym}`);
  if(!el||!r.klines||r.klines.length<2)return;
  el.innerHTML='';
  const chart=LightweightCharts.createChart(el,{
    width:el.clientWidth,height:150,
    layout:{background:{type:'solid',color:'#0d1520'},textColor:'#64748b'},
    grid:{vertLines:{color:'#1a2535'},horzLines:{color:'#1a2535'}},
    rightPriceScale:{borderColor:'#1f2d45',scaleMargins:{top:0.1,bottom:0.1}},
    timeScale:{borderColor:'#1f2d45',timeVisible:true,secondsVisible:false},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
    handleScroll:false,handleScale:false,
  });
  const candle=chart.addCandlestickSeries({upColor:'#22c55e',downColor:'#ef4444',borderUpColor:'#22c55e',borderDownColor:'#ef4444',wickUpColor:'#22c55e',wickDownColor:'#ef4444'});
  candle.setData(r.klines.map(k=>({time:Math.floor(k.t/1000),open:k.o,high:k.h,low:k.l,close:k.c})));
  const closes=r.klines.map(k=>k.c);
  const e9A=ema(closes,9),e21A=ema(closes,21);
  const e9S=chart.addLineSeries({color:'#06b6d4',lineWidth:1,priceLineVisible:false,lastValueVisible:false});
  const e21S=chart.addLineSeries({color:'#f97316',lineWidth:1,priceLineVisible:false,lastValueVisible:false});
  e9S.setData(r.klines.map((k,i)=>({time:Math.floor(k.t/1000),value:e9A[i]})).filter(d=>!isNaN(d.value)));
  e21S.setData(r.klines.map((k,i)=>({time:Math.floor(k.t/1000),value:e21A[i]})).filter(d=>!isNaN(d.value)));
  // 진입가 라인
  if(r.entry&&r.signal!=='HOLD'){
    const entSeries=chart.addLineSeries({color:r.signal.includes('BUY')?'#3b82f6':'#a855f7',lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:true});
    entSeries.setData([{time:Math.floor(r.klines[0].t/1000),value:r.entry},{time:Math.floor(r.klines[r.klines.length-1].t/1000),value:r.entry}]);}
  chart.timeScale().fitContent();}

// ══════════════════════════════════════════════
// 그리드 + 정렬
// ══════════════════════════════════════════════
function renderGrid(results){
  const grid=document.getElementById('grid');
  let filtered=curFilter==='ALL'?[...results]:results.filter(r=>r.signal===curFilter);
  if(!filtered.length){grid.innerHTML=`<div class="loading">해당 신호 없음</div>`;return;}
  const sort=document.getElementById('sortSel').value;
  const sigOrd={'STRONG_BUY':0,'BUY':1,'HOLD':2,'SELL':3,'STRONG_SELL':4};
  if(sort==='signal')filtered.sort((a,b)=>{const d=Math.abs(b.score)-Math.abs(a.score);return d!==0?d:sigOrd[a.signal]-sigOrd[b.signal];});
  else if(sort==='score')filtered.sort((a,b)=>b.score-a.score);
  else if(sort==='vol')filtered.sort((a,b)=>b.volume24h-a.volume24h);
  else if(sort==='change')filtered.sort((a,b)=>Math.abs(b.change24h)-Math.abs(a.change24h));
  grid.innerHTML=filtered.map(renderCard).join('');
  requestAnimationFrame(()=>filtered.forEach(drawChart));}

function updateSummary(res,elapsed){
  const cnt=s=>res.filter(r=>r.signal===s).length;
  document.getElementById('s0').textContent=res.length;
  document.getElementById('s1').textContent=cnt('STRONG_BUY');
  document.getElementById('s2').textContent=cnt('BUY');
  document.getElementById('s3').textContent=cnt('HOLD');
  document.getElementById('s4').textContent=cnt('SELL');
  document.getElementById('s5').textContent=cnt('STRONG_SELL');
  document.getElementById('s6').textContent=`${elapsed}s`;
  document.getElementById('s7').textContent=tgSentCount;}

function setStatus(t,c){const el=document.getElementById('status');el.textContent=t;el.className=`st-${c}`;}

function showToast(sym,sig,price){
  const meta=KR_EX[sym.replace('USDT','')]||{};
  const div=document.createElement('div');
  div.className=`ti ${sig.includes('BUY')?'tb':'ts'}`;
  div.textContent=`${sig.replace('_',' ')} ${sym.replace('USDT','')}${meta.ko?`(${meta.ko})`:''} $${fp(price)}`;
  document.getElementById('toast').appendChild(div);setTimeout(()=>div.remove(),6000);}

// ══════════════════════════════════════════════
// 스캔 루프
// ══════════════════════════════════════════════
async function runScan(){
  const tf=document.getElementById('tfSel').value;
  document.getElementById('scanBtn').disabled=true;
  setStatus('종목 조회 중...','scan');
  tgSentCount=0;
  const t0=Date.now();

  let symList;
  try{symList=await fetchTopSymbols(cfg.scanCount);}
  catch(e){setStatus('종목 조회 실패','err');document.getElementById('scanBtn').disabled=false;return;}

  const total=symList.length;
  const pf=document.getElementById('progressFill');
  const results=[];
  const tgMinSet=new Set(cfg.minSig.split(','));

  for(let i=0;i<symList.length;i++){
    pf.style.width=`${((i+1)/total*100).toFixed(0)}%`;
    setStatus(`${i+1}/${total} 분석중...`,'scan');
    try{
      const r=await analyze(symList[i],tf);
      results.push(r);
      const prev=prevSigs[r.sym];
      const isNewSig=prev!==undefined&&prev!==r.signal;
      if(isNewSig&&r.signal!=='HOLD')showToast(r.sym,r.signal,r.price);
      prevSigs[r.sym]=r.signal;
      // 텔레그램 전송
      if((isNewSig||prev===undefined)&&(cfg.minSig==='ALL'||tgMinSet.has(r.signal))&&r.signal!=='HOLD'){
        const meta=KR_EX[r.sym.replace('USDT','')]||{};
        const ok=await sendTelegram(buildTgMessage(r,meta));
        if(ok)tgSentCount++;
      }
    }catch(e){console.warn(symList[i].sym,e);}
  }

  pf.style.width='100%';
  lastResults=results;
  renderGrid(results);
  updateSummary(results,((Date.now()-t0)/1000).toFixed(1));
  setStatus(`완료 ${new Date().toLocaleTimeString('ko-KR')}`,'ok');
  document.getElementById('scanBtn').disabled=false;
  setTimeout(()=>{pf.style.width='0%';},2000);}

function startScan(){
  if(scanTimer)clearInterval(scanTimer);
  runScan();
  const iv=+document.getElementById('ivSel').value;
  if(iv>0)scanTimer=setInterval(runScan,iv*1000);}

function setF(el){
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');curFilter=el.dataset.f;renderGrid(lastResults);}

// ══════════════════════════════════════════════
// 초기화
// ══════════════════════════════════════════════
loadSettings();
fetchKrwRate();
setInterval(fetchKrwRate,300000);
window.addEventListener('load',startScan);
</script>
